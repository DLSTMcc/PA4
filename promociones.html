  #menu {

  /* Contenedor principal del cupón */
.cupon-container{
    position: relative;
    background: linear-gradient(160deg, #111111 0%, #1a1a1a 100%);
    border: 3px dashed #d4af37;
    border-radius: 15px;

    width: 550px;
    max-width: 90%;

    padding: 45px 50px;
    text-align: center;

    box-shadow: 0 0 30px rgba(212,175,55,.30);

    animation: aparecer 0.8s ease-out, flotar 4s ease-in-out infinite;
}


.cupon-container::before,
.cupon-container::after{
    content: "";
    position: absolute;

    width: 40px;
    height: 40px;

    background: black;   /* mismo color del fondo */

    border-radius: 50%;

    top: 50%;
    transform: translateY(-50%);
}

.cupon-container::before{
    left: -20px;
}

.cupon-container::after{
    right: -20px;
}

/* Entrada del cupón */
@keyframes aparecer{

    0%{
        opacity: 0;
        transform: translateY(40px) scale(.9);
    }

    100%{
        opacity: 1;
        transform: translateY(0) scale(1);
    }

}


@keyframes flotar{

    0%,100%{
        transform: translateY(0);
    }

    50%{
        transform: translateY(-10px);
    }

}


.cupon-container h1{
    color: #d4af37;
    font-size: 2.2rem;
    margin-bottom: 15px;
    letter-spacing: 2px;
}


.oferta{
    display: inline-block;
    background: #d4af37;
    color: #111;
    padding: 8px 20px;
    border-radius: 25px;
    font-weight: bold;
    margin-bottom: 20px;
    letter-spacing: 1px;
}

/* Descripción */
.cupon-container p{
    color: #d8d8d8;
    margin-bottom: 30px;
    line-height: 1.6;
}

/* Botón */
.btn-cupon{
    display: inline-block;
    background: transparent;
    color: #d4af37;
    border: 2px solid #d4af37;

    padding: 14px 30px;

    border-radius: 8px;

    cursor: pointer;

    transition: .3s;
}

.btn-cupon:hover{

    background: #d4af37;
    color: #111;

    transform: scale(1.05);

    box-shadow: 0 0 20px rgba(212,175,55,.6);

}


.overlay{
    position:absolute;
    inset:0;

    background:rgba(0,0,0,.80);

    display:flex;
    justify-content:center;
    align-items:center;

    opacity:0;
    visibility:hidden;

    transition:.4s;

    border-radius:15px;
}

/* Mostrar popup */
#popup:checked ~ .overlay{
    opacity:1;
    visibility:visible;
}

/* Ventana */
.popup{

    position:relative;

    width:340px;

    background:linear-gradient(160deg,#111,#1b1b1b);

    border:2px dashed #d4af37;

    border-radius:12px;

    padding:35px;

    text-align:center;

    box-shadow:0 0 25px rgba(212,175,55,.4);

    animation:popup .5s ease;

}

/* Forma de cupón */
.popup::before,
.popup::after{

    content:"";

    position:absolute;

    width:28px;
    height:28px;

    background:black;

    border-radius:50%;

    top:50%;
    transform:translateY(-50%);
}

.popup::before{
    left:-14px;
}

.popup::after{
    right:-14px;
}

/* Animación */

@keyframes popup{

    0%{
        opacity:0;
        transform:scale(.5);
    }

    70%{
        transform:scale(1.08);
    }

    100%{
        opacity:1;
        transform:scale(1);
    }

}



.check{

    width:70px;
    height:70px;

    margin:auto;

    border-radius:50%;

    border:3px solid #d4af37;

    color:#d4af37;

    display:flex;

.codigo{
